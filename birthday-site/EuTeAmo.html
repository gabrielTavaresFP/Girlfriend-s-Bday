<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gothic Heart - Dark Particles</title>
    <style>
        /* CSS - Estilo Gótico Refinado */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            cursor: crosshair;
        }

        /* Botão de Voltar Gótico */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: transparent;
            color: #8b0000;
            border: 1px solid #4a0000;
            text-decoration: none;
            font-family: 'Times New Roman', serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
            transition: all 0.4s;
            z-index: 100;
        }

        .back-btn:hover {
            background: #4a0000;
            color: #000;
            box-shadow: 0 0 15px #8b0000;
        }

        #instructions {
            position: absolute;
            color: #2e0000;
            font-family: 'serif';
            letter-spacing: 3px;
            pointer-events: none;
            text-transform: uppercase;
            font-size: 12px;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Voltar</a>
    <div id="instructions">Toque na Escuridão</div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        // Paleta de cores: tons de sangue, vinho e fumaça
        const colors = ['#4a0000', '#8b0000', '#1a0000', '#300000', '#5c0000'];

        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = Math.random() * 1.5 + 0.5;
                this.speed = Math.random() * 0.04 + 0.015; // Velocidade ligeiramente mais lenta para elegância
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.decay = Math.random() * 0.005 + 0.003;
            }

            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                
                // Começa a sumir quando chega perto do destino
                if (Math.abs(this.x - this.targetX) < 10) {
                    this.alpha -= this.decay;
                }
            }

            draw() {
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createHeart(originX, originY) {
            // Aumentado para 500 partículas para um efeito bem denso
            const numParticles = 500; 
            for (let i = 0; i < numParticles; i++) {
                const t = Math.random() * Math.PI * 2;
                
                // Equação do Coração
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                const scale = 13; 
                const targetX = originX + x * scale;
                const targetY = originY + y * scale;

                // Partículas saem do ponto de clique para a borda do coração
                particles.push(new Particle(originX, originY, targetX, targetY));
            }
        }

        function animate() {
            // Fundo com rastro preto para efeito de movimento
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('mousedown', (e) => {
            // Evita disparar se clicar no botão de voltar
            if (e.target.tagName !== 'A') {
                createHeart(e.clientX, e.clientY);
                document.getElementById('instructions').style.opacity = '0';
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
