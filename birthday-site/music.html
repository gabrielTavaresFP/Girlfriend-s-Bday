<body class="meuCodigo">

    <div class="spotify-container">
        <div class="sidebar">
            <h3>Sua Playlist 🎀</h3>
            <ul id="playlist">
                </ul>
        </div>

        <div class="main-player">
            <div class="album-art">
                <img src="../assets/images/capa-padrao.jpg" id="current-cover" alt="Capa">
            </div>
            <div class="track-info">
                <h2 id="track-title">Selecione uma música</h2>
                <p id="track-artist">Artista</p>
            </div>
            
            <div class="controls">
                <button id="shuffle" title="Ordem Aleatória"><i class="fas fa-random"></i></button>
                <button id="prev"><i class="fas fa-step-backward"></i></button>
                <button id="play" class="play-btn"><i class="fas fa-play"></i></button>
                <button id="next"><i class="fas fa-step-forward"></i></button>
            </div>
                
            <div class="volume-container">
    <i class="fas fa-volume-up"></i>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
</div>


            <div class="progress-container">
                <span id="current-time">0:00</span>
                <input type="range" id="progress" value="0">
                <span id="duration">0:00</span>
            </div>
        </div>
    </div>

    <audio id="audio-player" src=""></audio>
    <script src="../js/music.js"></script>
</body>
